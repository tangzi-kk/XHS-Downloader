name: 视频队列兜底 Worker

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: xhs-video-worker
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  fallback-video-worker:
    runs-on: ubuntu-latest

    steps:
      - name: 下载项目代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt curl-cffi

      - name: 确认 FFmpeg 可用
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi
          ffmpeg -version

      - name: Mac mini 失联时处理视频任务
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VIDEO_WORKER_MAX_TASKS: "24"
          VIDEO_DISPATCH_INTERVAL_SECONDS: "0"
          VIDEO_WORKER_HEARTBEAT_MAX_AGE_SECONDS: "600"
          VIDEO_WORKER_FALLBACK_LOCK_TTL_SECONDS: "900"
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BITABLE_APP_TOKEN: ${{ secrets.FEISHU_BITABLE_APP_TOKEN }}
          FEISHU_BITABLE_TABLE_ID: ${{ secrets.FEISHU_BITABLE_TABLE_ID }}
          FEISHU_VIDEO_TASK_TABLE_ID: ${{ secrets.FEISHU_VIDEO_TASK_TABLE_ID }}
        run: python scripts/run_video_worker_once.py
