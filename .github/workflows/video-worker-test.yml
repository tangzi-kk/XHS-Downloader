name: 视频队列手动测试

on:
  workflow_dispatch:

concurrency:
  group: xhs-video-worker
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  process-one-video:
    runs-on: ubuntu-latest

    steps:
      - name: 下载项目代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt curl-cffi

      - name: 确认 FFmpeg 可用
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi
          ffmpeg -version

      - name: 处理最多一条视频任务
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BITABLE_APP_TOKEN: ${{ secrets.FEISHU_BITABLE_APP_TOKEN }}
          FEISHU_BITABLE_TABLE_ID: ${{ secrets.FEISHU_BITABLE_TABLE_ID }}
          FEISHU_VIDEO_TASK_TABLE_ID: ${{ secrets.FEISHU_VIDEO_TASK_TABLE_ID }}
        run: python scripts/run_video_worker_once.py
